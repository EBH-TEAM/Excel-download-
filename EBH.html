<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TeamWork Clean Exporter | No BOM No Extra Quotes</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0f172a 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            text-align: center;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(71, 85, 105, 0.4);
        }

        h2 {
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.8rem;
        }

        .auto-download-btn {
            background: linear-gradient(105deg, #2563eb, #1e40af);
            border: none;
            padding: 16px 28px;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            margin: 20px 0 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            transition: all 0.25s ease;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .auto-download-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #3b82f6, #2563eb);
            box-shadow: 0 18px 28px -8px rgba(37, 99, 235, 0.6);
        }

        .status {
            background: #0f172a;
            padding: 1rem 1.2rem;
            border-radius: 1.2rem;
            color: #cbd5e1;
            font-size: 0.9rem;
            margin-top: 20px;
            border-left: 4px solid #3b82f6;
            text-align: left;
            font-family: 'JetBrains Mono', monospace;
            word-break: break-word;
        }

        .badge {
            background: #1e293b;
            color: #94a3b8;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            border: 1px solid #334155;
        }

        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            font-size: 0.7rem;
            color: #475569;
            margin-top: 18px;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="card">
    <h2>
        <i class="fas fa-database" style="color: #60a5fa;"></i>
        TEAMWORK CLEAN EXPORTER
    </h2>
    <button class="auto-download-btn" id="exportBtn">
        <i class="fas fa-file-csv"></i> EXPORT CLEAN DATA
    </button>
    <div class="status" id="statusMsg">
        <i class="fas fa-sync-alt fa-fw"></i> Initializing secure connection...
    </div>
    <div class="badge">
        <i class="fas fa-bolt"></i> Auto‑export on page load &nbsp;|&nbsp; 
        <i class="fas fa-fire"></i> No BOM / No Extra Quotes
    </div>
    <div class="footer-note">
        📁 সরাসরি অ্যাকাউন্ট ডাউনলোড — কোনো হেডার লাইন নেই, কোনো বাড়তি উদ্ধৃতি চিহ্ন থাকবে না
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 🔥 FIREBASE CONFIGURATION (teamwork-206ba)
    // --------------------------------------------------------------
    const firebaseConfig = {
        apiKey: "AIzaSyDLh6Zg-K3ZZexLvLloRaR0F6Wr4ciHqAs",
        authDomain: "teamwork-206ba.firebaseapp.com",
        databaseURL: "https://teamwork-206ba-default-rtdb.firebaseio.com",
        projectId: "teamwork-206ba",
        storageBucket: "teamwork-206ba.firebasestorage.app",
        messagingSenderId: "906293702680",
        appId: "1:906293702680:web:bf8c2257e1e87964ded36d",
        measurementId: "G-1KJRG83FK4"
    };

    // Initialize Firebase
    let app;
    try {
        app = firebase.initializeApp(firebaseConfig);
        console.log("✅ Firebase initialized: teamwork-206ba");
    } catch (err) {
        console.warn("Init error:", err);
        app = firebase.app();
    }
    const database = firebase.database();

    // Helper function to clean any string: removes BOM, removes surrounding quotes, trims whitespace
    function cleanString(rawValue) {
        if (rawValue === undefined || rawValue === null) return "";
        
        let cleaned = String(rawValue);
        
        // 1. Remove UTF-8 BOM characters (ï»¿ or \uFEFF)
        cleaned = cleaned.replace(/^\uFEFF/, '');
        cleaned = cleaned.replace(/^ï»¿/, '');
        
        // 2. Remove surrounding double quotes if they wrap the entire string (and they are even count)
        // Example: "goat.8449638" -> goat.8449638
        if (cleaned.startsWith('"') && cleaned.endsWith('"')) {
            cleaned = cleaned.substring(1, cleaned.length - 1);
        }
        // Sometimes there are triple quotes like """goat.8449638""" -> extract inner
        // This regex removes any number of leading and trailing double quotes
        cleaned = cleaned.replace(/^"+/, '');
        cleaned = cleaned.replace(/"+$/, '');
        
        // 3. Trim whitespace and newlines
        cleaned = cleaned.trim();
        
        // 4. If still empty, return N/A but without quotes
        if (cleaned === "") return "";
        
        return cleaned;
    }

    // Fetch all account entries recursively from ANY structure
    async function fetchAllAccountEntries() {
        const rootSnapshot = await database.ref('/').once('value');
        const rootData = rootSnapshot.val();
        if (!rootData) return [];
        
        const accountsArray = [];
        
        // Recursive traversal to find objects containing username+password
        function traverse(node, path = "") {
            if (!node || typeof node !== 'object') return;
            
            // Check if current node looks like an account object (has username/user + password/pass)
            const hasUsername = (node.username !== undefined || node.user !== undefined);
            const hasPassword = (node.password !== undefined || node.pass !== undefined);
            
            if (hasUsername && hasPassword) {
                let rawUsername = node.username || node.user || "";
                let rawPassword = node.password || node.pass || "";
                let rawCookie = node.cookies || node.cookie || node.token || "";
                
                // CLEAN each field: remove BOM, extra quotes, spaces
                let cleanUsername = cleanString(rawUsername);
                let cleanPassword = cleanString(rawPassword);
                let cleanCookie = cleanString(rawCookie);
                
                // Fallback if cleaning results empty
                if (cleanUsername === "") cleanUsername = "N/A";
                if (cleanPassword === "") cleanPassword = "N/A";
                
                accountsArray.push({
                    username: cleanUsername,
                    password: cleanPassword,
                    cookies: cleanCookie
                });
            }
            
            // Continue traversing children
            for (let key in node) {
                if (node.hasOwnProperty(key) && typeof node[key] === 'object') {
                    traverse(node[key], path + "/" + key);
                }
            }
        }
        
        traverse(rootData);
        
        // Fallback: try specific path "accounts/parvez" if nothing found
        if (accountsArray.length === 0) {
            console.log("Scanning fallback path: accounts/parvez");
            const legacySnapshot = await database.ref('accounts/parvez').once('value');
            const parvezData = legacySnapshot.val();
            if (parvezData && typeof parvezData === 'object') {
                Object.values(parvezData).forEach((item) => {
                    if (item && typeof item === 'object') {
                        let rawUsername = item.username || item.user || "";
                        let rawPassword = item.password || item.pass || "";
                        let rawCookie = item.cookies || item.cookie || "";
                        
                        let cleanUsername = cleanString(rawUsername);
                        let cleanPassword = cleanString(rawPassword);
                        let cleanCookie = cleanString(rawCookie);
                        
                        if (cleanUsername === "") cleanUsername = "N/A";
                        if (cleanPassword === "") cleanPassword = "N/A";
                        
                        accountsArray.push({
                            username: cleanUsername,
                            password: cleanPassword,
                            cookies: cleanCookie
                        });
                    }
                });
            }
        }
        
        // Remove duplicates (same username+password)
        const uniqueMap = new Map();
        for (const acc of accountsArray) {
            const key = `${acc.username}|${acc.password}`;
            if (!uniqueMap.has(key)) {
                uniqueMap.set(key, acc);
            }
        }
        return Array.from(uniqueMap.values());
    }
    
    // Main export: CSV without ANY header row, no BOM, no extra quotes, just clean data
    async function exportDataToCSV() {
        const statusDiv = document.getElementById("statusMsg");
        statusDiv.innerHTML = '<span class="loader"></span> Fetching & cleaning data from TeamWork Firebase ...';
        
        try {
            const accounts = await fetchAllAccountEntries();
            
            if (!accounts || accounts.length === 0) {
                statusDiv.innerHTML = '⚠️ No account records found in database. <br> Make sure Firebase contains username/password/cookies data.';
                return;
            }
            
            // -----------------------------------------------
            // 🔥 ULTRA CLEAN: No BOM, No Header, No Extra Quotes
            // Each row: username,password,cookies  (comma separated, fields are NOT wrapped in quotes)
            // But to handle commas inside username/password, we MUST wrap in quotes.
            // However the user saw extra quotes issue. Actually CSV standard requires quotes if value contains comma.
            // But I'll make it clean: if value has comma, then quote it; otherwise no quotes.
            // Also ensure no BOM prefix in file.
            // -----------------------------------------------
            const csvRows = [];
            
            for (const acc of accounts) {
                // Function to format CSV field: add quotes only if needed (contains comma, newline, or double quote)
                function formatField(value) {
                    if (value === undefined || value === null) return '""';
                    let str = String(value);
                    // If the string contains comma, newline, or double quote, wrap in quotes and escape internal quotes
                    if (str.includes(',') || str.includes('\n') || str.includes('"')) {
                        // Escape double quotes by replacing " with ""
                        str = str.replace(/"/g, '""');
                        return `"${str}"`;
                    }
                    return str;
                }
                
                const formattedUsername = formatField(acc.username);
                const formattedPassword = formatField(acc.password);
                const formattedCookies = formatField(acc.cookies);
                
                csvRows.push(`${formattedUsername},${formattedPassword},${formattedCookies}`);
            }
            
            // Join rows with newline — NO header row, NO BOM prefix
            let csvContent = csvRows.join("\n");
            
            // Remove any accidental BOM from the whole content
            csvContent = csvContent.replace(/^\uFEFF/, '');
            
            // Create blob WITHOUT BOM (use utf-8 without BOM)
            const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            // Generate filename with timestamp
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const dateStr = `${year}-${month}-${day}_${hours}-${minutes}-${seconds}`;
            const fileName = `Clean_Accounts_${dateStr}.csv`;
            
            link.href = url;
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            // Preview first 3 accounts to show user it's clean
            let previewText = "";
            if (accounts.length > 0) {
                const first = accounts[0];
                previewText = `<br>📌 উদাহরণ: ${first.username} , ${first.password}`;
            }
            
            statusDiv.innerHTML = `✅ <i class="fas fa-check-circle" style="color:#10b981;"></i> Clean Export Successful! <br> 📄 ${fileName} <br> 📊 Total accounts: ${accounts.length} <br> 🔗 কোনো BOM নেই, কোনো বাড়তি কোটেশন নেই${previewText}`;
            console.log(`✅ Exported ${accounts.length} accounts — completely cleaned, no extra quotes, no BOM`);
            
        } catch (err) {
            console.error("Export error:", err);
            let errorMsg = err.message || "Unknown error";
            if (err.code) errorMsg = `${err.code}: ${err.message}`;
            statusDiv.innerHTML = `❌ Export failed: ${errorMsg} <br> ⚠️ Check Firebase rules or permissions.`;
        }
    }
    
    // Manual button click
    const exportBtn = document.getElementById("exportBtn");
    if (exportBtn) {
        exportBtn.addEventListener("click", (e) => {
            e.preventDefault();
            exportDataToCSV();
        });
    }
    
    // ⭐ AUTO DOWNLOAD ON PAGE LOAD (no click needed)
    window.addEventListener("DOMContentLoaded", () => {
        setTimeout(() => {
            exportDataToCSV().catch(e => {
                console.warn("Auto-export error:", e);
                const statusDiv = document.getElementById("statusMsg");
                if (statusDiv) statusDiv.innerHTML = `⚠️ Auto export error: ${e.message}`;
            });
        }, 400);
    });
    
    // Firebase connection monitor
    database.ref('.info/connected').on('value', (snap) => {
        if (snap.val() === true) {
            console.log("🔥 Firebase connected: teamwork-206ba");
        }
    });
</script>
</body>
</html>
